name: Hello World
run-name: Hello World
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
      - name: Variable
        run: echo "USERNAME=${{ github.actor }}" >> $GITHUB_ENV
      - name: script
        run: python main.py

  node:
    runs-on: ubuntu-24.04

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]    

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
      - name: Node JS
        uses: actions/setup-node@v6.4.0
        with:
          cache: "npm"
      - name: script
        run: node main.js
